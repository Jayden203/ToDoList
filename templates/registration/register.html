{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="page-card">
            <h1 class="section-title">Create an Account</h1>
            <p class="form-help">Complete the form below to create your account.</p>

            <form method="post" novalidate>
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>

            <p class="mt-3 mb-1">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
            <p class="mb-0"><a href="{% url 'home' %}">Back to Home</a></p>
        </div>
    </div>
</div>
{% endblock %}
